<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<button class="logout" onclick="logout()">Cerrar sesión</button>
<h1>Reportar Emergencia</h1>
</header>

<section class="simulador">

<h2>Tipo de alerta</h2>

<button class="tipo-btn" onclick="seleccionarTipo('Medica', this)">Alerta Médica</button>
<button class="tipo-btn" onclick="seleccionarTipo('Insumos', this)">Falta de Insumos</button>
<button class="tipo-btn" onclick="seleccionarTipo('Personal', this)">Falta de Personal</button>

<h2>Edificio</h2>

<button class="edificio-btn" onclick="seleccionarEdificio('A', this)">A</button>
<button class="edificio-btn" onclick="seleccionarEdificio('B', this)">B</button>
<button class="edificio-btn" onclick="seleccionarEdificio('C', this)">C</button>
<button class="edificio-btn" onclick="seleccionarEdificio('D', this)">D</button>
 <select id="tipo de Personal">
      <option value="">Selecciona tipo de personal</option>
      <option value="Limpieza">Limpieza</option>
      <option value="ingenieria">ingenieria</option>
    </select>

<h2>Aula</h2>

<button class="aula-btn" onclick="seleccionarAula(1, this)">1</button>
<button class="aula-btn" onclick="seleccionarAula(2, this)">2</button>
<button class="aula-btn" onclick="seleccionarAula(3, this)">3</button>
<button class="aula-btn" onclick="seleccionarAula(4, this)">4</button>
<button class="aula-btn" onclick="seleccionarAula(5, this)">5</button>
<button class="aula-btn" onclick="seleccionarAula(6, this)">6</button>
<button class="aula-btn" onclick="seleccionarAula(7, this)">7</button>
<button class="aula-btn" onclick="seleccionarAula(8, this)">8</button>
<button class="aula-btn" onclick="seleccionarAula(9, this)">9</button>
<button class="aula-btn" onclick="seleccionarAula(10, this)">10</button>

<br><br>

<button onclick="enviarReporte()">ENVIAR REPORTE</button>

</section>

<script src="reportar.js"></script>

</body>
</html>
